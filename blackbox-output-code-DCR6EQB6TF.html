<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One:wght@400&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
        }

        .container {
            text-align: center;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .container.active {
            opacity: 1;
            transform: scale(1);
        }

        .horse {
            width: 300px;
            height: 300px;
            margin: 0 auto 30px;
            position: relative;
            cursor: pointer;
        }

        .horse-emoji {
            font-size: 280px;
            line-height: 1;
            animation: bounce 2s infinite;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.2));
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-30px); }
            60% { transform: translateY(-15px); }
        }

        .message {
            font-size: 28px;
            color: #ff6b9d;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.6s ease;
        }

        .message.show {
            opacity: 1;
            transform: translateY(0);
        }

        .birthday {
            font-size: 48px;
            background: linear-gradient(45deg, #ff6b9d, #ffd93d, #ff6b9d);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientShift 3s ease infinite, popIn 1s ease 1s forwards;
            opacity: 0;
            transform: scale(0.5);
            margin-top: 20px;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes popIn {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .heart {
            position: absolute;
            font-size: 24px;
            color: #ff69b4;
            animation: float 4s infinite linear;
            opacity: 0;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) rotate(360deg);
                opacity: 0;
            }
        }

        .click-hint {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff6b9d;
            font-size: 18px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="hearts" id="hearts"></div>
    
    <div class="container" id="container">
        <div class="horse">
            <div class="horse-emoji">🐴✨</div>
        </div>
        <div class="message" id="message1">Hey there cutie! 🥰</div>
        <div class="message" id="message2">You look amazing today! 😍</div>
        <div class="message" id="message3">Wanna go on an adventure? 🐎💕</div>
        <div class="birthday" id="birthday">Happy Birthdayyy Akku! 🎉🎂</div>
    </div>

    <div class="click-hint">✨ Click anywhere to start the magic! ✨</div>

    <script>
        const container = document.getElementById('container');
        const message1 = document.getElementById('message1');
        const message2 = document.getElementById('message2');
        const message3 = document.getElementById('message3');
        const birthday = document.getElementById('birthday');
        const heartsContainer = document.getElementById('hearts');
        const clickHint = document.querySelector('.click-hint');

        let clickCount = 0;
        const messages = [message1, message2, message3];

        // Show click hint initially
        setTimeout(() => {
            clickHint.style.display = 'block';
        }, 500);

        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '💖';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heartsContainer.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 5000);
        }

        document.addEventListener('click', (e) => {
            clickCount++;
            clickHint.style.display = 'none';

            // First click: show container
            if (clickCount === 1) {
                container.classList.add('active');
                createHeart();
                setTimeout(() => createHeart(), 200);
            }

            // Show flirt messages progressively
            if (clickCount >= 2 && clickCount <= 4) {
                messages[clickCount - 2].classList.add('show');
                for (let i = 0; i < 3; i++) {
                    createHeart();
                }
            }

            // Show birthday message
            if (clickCount >= 5) {
                birthday.style.display = 'block';
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => createHeart(), i * 100);
                }
            }

            // Continuous hearts after activation
            if (clickCount > 1) {
                setTimeout(createHeart, Math.random() * 500);
            }
        });

        // Auto-trigger on mobile/touch
        document.addEventListener('touchstart', (e) => {
            e.preventDefault();
            document.dispatchEvent(new MouseEvent('click', {bubbles: true}));
        }, { passive: false });

        // Add some sparkle effect
        setInterval(() => {
            if (container.classList.contains('active')) {
                createHeart();
            }
        }, 1000);
    </script>
</body>
</html>
